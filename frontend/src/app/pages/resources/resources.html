<!-- ══════════════════════════════════════ RESOURCES ══════════════════════════════════════ -->
<section class="resources section" id="resources">
    <div class="resources-bg">
        <div class="resources-glow"></div>
    </div>

    <div class="container">
        <div class="section-header">
            <div class="section-label">Vault</div>
            <h2 class="section-title">Club <span class="text-gradient">Resources</span></h2>
            <p class="section-sub">Bootcamp slides, cheat sheets, and technical PDFs.</p>
        </div>

        <div *ngIf="resources.length === 0" class="text-center text-muted my-5 fade-in">
            <i class="bi bi-folder-x display-4"></i>
            <p class="mt-3">The resource vault is currently empty.</p>
        </div>

        <div class="resources-grid" *ngIf="resources.length > 0">
            <div class="resource-card fade-in" *ngFor="let res of resources">
                <div class="res-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>

                <div class="res-body">
                    <h3 class="res-title">{{ res.title }}</h3>
                    <p class="res-desc">{{ res.description }}</p>
                    <div class="res-meta">
                        <span class="res-type">PDF Document</span>
                        <span class="res-date">Added {{ res.created_at | date:'mediumDate' }}</span>
                    </div>
                </div>

                <div class="res-action">
                    <!-- Approved Users can Download -->
                    <a *ngIf="isLoggedIn && isApproved" [href]="res.file_url" target="_blank"
                        class="btn btn-sm btn-outline-orange">
                        <i class="bi bi-download me-1"></i> Download
                    </a>

                    <!-- Pending Users -->
                    <button *ngIf="isLoggedIn && !isApproved" class="btn btn-sm btn-outline-secondary" disabled
                        title="Pending Admin Approval">
                        <i class="bi bi-lock-fill me-1"></i> Locked
                    </button>

                    <!-- Visitors must Log In -->
                    <a *ngIf="!isLoggedIn" routerLink="/login" class="btn btn-sm btn-outline-secondary">
                        Log In to Download
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
